<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Lammer | Стеклянная визитка</title>
    <meta name="description" content="Связь со мной: VK, Telegram, MAX. Нажми на карточку, чтобы скопировать ссылку или ник.">
    <meta property="og:title" content="Lammer | Мои контакты">
    <meta property="og:description" content="Стеклянная визитка с анимациями и QR-кодами">
    <meta property="og:type" content="website">
    <style>
        /* ----- RESET & БАЗА ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem 1.5rem;
            transition: background 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1), color 0.3s;
            position: relative;
        }

        /* ----- ПЛАВНЫЙ ФОН (анимированный градиент) ----- */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            transition: opacity 0.8s;
        }

        body.day::before {
            background: linear-gradient(125deg, #fef3c7, #dcfce7, #bbf0d0);
            background-size: 200% 200%;
            animation: gradientShift 20s ease infinite alternate;
        }

        body.night::before {
            background: radial-gradient(ellipse at 40% 45%, #0b1120, #03050b);
            background-size: 200% 200%;
            animation: gradientShiftNight 18s ease infinite alternate;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 30%; }
            100% { background-position: 100% 70%; }
        }
        @keyframes gradientShiftNight {
            0% { background-position: 10% 20%; }
            100% { background-position: 90% 80%; }
        }

        /* Декоративные элементы фона (день — поле, ночь — звёзды) */
        body.day .field-deco {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 180px;
            background: repeating-linear-gradient(transparent, transparent 38px, rgba(160, 200, 100, 0.2) 38px, rgba(210, 180, 100, 0.1) 45px);
            pointer-events: none;
            z-index: -1;
        }

        body.day .sun-deco {
            position: fixed;
            top: 30px;
            right: 30px;
            font-size: 100px;
            opacity: 0.3;
            filter: blur(2px);
            pointer-events: none;
            transition: opacity 0.5s;
        }

        body.night .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .star {
            position: absolute;
            background-color: #fff;
            border-radius: 50%;
            opacity: 0.6;
            animation: twinkle 3s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(1);}
            100% { opacity: 1; transform: scale(1.2);}
        }

        /* ----- ПЕРЕКЛЮЧАТЕЛЬ ТЕМЫ (аккуратный) ----- */
        .theme-switch {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(20, 20, 40, 0.5);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 10px 20px;
            border: 1px solid rgba(255,255,255,0.3);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            color: white;
            transition: all 0.2s;
            font-family: inherit;
        }
        .theme-switch:hover {
            transform: scale(1.02);
            background: rgba(0,0,0,0.6);
        }

        /* ----- КОНТЕЙНЕР КАРТОЧЕК ----- */
        .cards-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            max-width: 1300px;
            margin: 1rem auto;
            position: relative;
            z-index: 5;
        }

        /* ----- СТЕКЛЯННАЯ КАРТОЧКА ----- */
        .glass-card {
            width: 310px;
            padding: 1.8rem 1.2rem 1.8rem 1.2rem;
            border-radius: 56px;
            backdrop-filter: blur(18px);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.4, 1.1);
            transform: translateY(40px);
            opacity: 0;
            animation: slideUpCard 0.6s forwards;
            will-change: transform, box-shadow;
        }

        .glass-card:nth-child(1) { animation-delay: 0.05s; }
        .glass-card:nth-child(2) { animation-delay: 0.18s; }
        .glass-card:nth-child(3) { animation-delay: 0.31s; }

        @keyframes slideUpCard {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Эффект при наведении (увеличение + подъем) */
        .glass-card:hover {
            transform: scale(1.04) translateY(-6px);
            transition: transform 0.25s ease;
        }

        /* Индивидуальные градиентные тени (неон) */
        .glass-card[data-social="vk"] {
            box-shadow: 0 20px 35px -10px rgba(74,144,226,0.4), 0 0 0 1px rgba(74,144,226,0.2);
        }
        .glass-card[data-social="tg"] {
            box-shadow: 0 20px 35px -10px rgba(0,212,255,0.4), 0 0 0 1px rgba(0,212,255,0.2);
        }
        .glass-card[data-social="max"] {
            box-shadow: 0 20px 35px -10px rgba(255,68,0,0.4), 0 0 0 1px rgba(255,68,0,0.2);
        }

        /* Свечение при клике (яркое) */
        .glass-card.glow {
            transition: 0.08s;
        }
        .glass-card[data-social="vk"].glow {
            box-shadow: 0 0 35px #ffb347, 0 0 18px #4a90e2;
        }
        .glass-card[data-social="tg"].glow {
            box-shadow: 0 0 40px #00d4ff, 0 0 20px #0077ff;
        }
        .glass-card[data-social="max"].glow {
            box-shadow: 0 0 45px #ff3300, 0 0 22px #ff0066;
        }

        /* QR-код с пульсацией при загрузке */
        .qr-code {
            width: 150px;
            height: 150px;
            margin: 0 auto 1.2rem;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 32px;
            padding: 12px;
            box-shadow: 0 12px 25px -8px rgba(0,0,0,0.2);
            transition: all 0.2s;
            animation: qrGlowPulse 0.7s ease-out 0.5s 1;
        }
        @keyframes qrGlowPulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,255,210,0.7);}
            50% { transform: scale(1.01); box-shadow: 0 0 0 10px rgba(255,255,210,0.3);}
            100% { transform: scale(1); box-shadow: 0 12px 25px -8px rgba(0,0,0,0.2);}
        }
        .qr-code img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            border-radius: 20px;
        }

        /* Иконка соцсети (текст с лёгкой анимацией при ховере) */
        .social-name {
            font-size: 1.9rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
            letter-spacing: -0.3px;
            display: inline-block;
            transition: transform 0.2s;
        }
        .glass-card:hover .social-name {
            animation: gentleWobble 0.35s ease;
        }
        @keyframes gentleWobble {
            0%,100% { transform: translateX(0); }
            30% { transform: translateX(-2px); }
            70% { transform: translateX(2px); }
        }

        /* Блок копирования */
        .copy-area {
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 48px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            backdrop-filter: blur(4px);
            transition: background 0.2s;
        }
        .copy-text {
            font-size: 0.8rem;
            font-weight: 500;
            word-break: break-all;
            flex: 1;
            text-align: left;
            color: inherit;
            opacity: 0.9;
        }
        .copy-btn {
            background: rgba(255,255,255,0.9);
            border: none;
            border-radius: 40px;
            padding: 6px 14px;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.15s;
            color: #111;
            font-family: inherit;
        }
        .copy-btn:hover {
            transform: scale(1.03);
            background: white;
        }

        /* ПОЧТОВЫЙ БЛОК (эргономичный) */
        .email-card {
            margin-top: 3rem;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(12px);
            border-radius: 80px;
            padding: 0.8rem 1.8rem;
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.2s;
            z-index: 5;
        }
        .email-card:hover {
            transform: scale(1.01);
            background: rgba(0, 0, 0, 0.35);
        }
        .email-icon {
            font-size: 1.4rem;
        }
        .email-address {
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.2px;
        }
        .copy-email-btn {
            background: white;
            border: none;
            border-radius: 40px;
            padding: 5px 14px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
        }
        .copy-email-btn:hover {
            transform: scale(1.02);
        }

        /* УВЕДОМЛЕНИЕ (тост) */
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e1e2cd9;
            backdrop-filter: blur(16px);
            color: white;
            padding: 10px 24px;
            border-radius: 60px;
            font-size: 0.85rem;
            z-index: 2000;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            font-weight: 500;
            white-space: nowrap;
            max-width: 90vw;
            white-space: normal;
            text-align: center;
        }

        /* АНИМАЦИОННЫЕ ЭЛЕМЕНТЫ (облака, самолёты, звезды, ленты) */
        .anim-cloud {
            position: fixed;
            font-size: 2.4rem;
            pointer-events: none;
            z-index: 1000;
            animation: floatCloud 0.85s ease-out forwards;
        }
        @keyframes floatCloud {
            0% { transform: scale(0.5) translate(0,0); opacity: 1; }
            100% { transform: scale(1.4) translate(var(--dx), var(--dy)); opacity: 0; }
        }

        .anim-plane {
            position: fixed;
            font-size: 2rem;
            pointer-events: none;
            z-index: 1000;
            animation: flyPlane 0.95s ease-out forwards;
        }
        @keyframes flyPlane {
            0% { transform: translate(0,0) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) rotate(720deg); opacity: 0; }
        }

        .anim-star-red {
            position: fixed;
            font-size: 2rem;
            pointer-events: none;
            z-index: 1000;
            animation: riseStar 0.85s ease-out forwards;
        }
        .anim-ribbon {
            position: fixed;
            font-size: 1.9rem;
            pointer-events: none;
            z-index: 1000;
            animation: spinRibbon 0.9s ease-out forwards;
        }
        @keyframes riseStar {
            0% { transform: scale(0.2) translate(0,0); opacity: 1; }
            100% { transform: scale(1.6) translate(var(--dx), var(--dy)); opacity: 0; }
        }
        @keyframes spinRibbon {
            0% { transform: rotate(0deg) scale(0.4); opacity: 1; }
            100% { transform: rotate(380deg) scale(1.5) translate(var(--dx), var(--dy)); opacity: 0; }
        }

        /* АДАПТИВНОСТЬ */
        @media (max-width: 720px) {
            .glass-card { width: 280px; padding: 1.4rem 1rem; }
            .qr-code { width: 130px; height: 130px; }
            .social-name { font-size: 1.6rem; }
            .email-address { font-size: 0.85rem; }
            .theme-switch { padding: 6px 14px; font-size: 0.8rem; top: 12px; right: 12px; }
        }
        @media (max-width: 480px) {
            body { padding: 1.5rem 1rem; }
            .cards-container { gap: 1.2rem; }
        }
    </style>
</head>
<body class="day">
    <!-- Декоративные элементы фона (день) -->
    <div class="field-deco"></div>
    <div class="sun-deco">☀️</div>
    <div class="stars-container" id="starsContainer"></div>

    <div class="theme-switch" id="themeToggle">🌙 Ночная тема</div>

    <div class="cards-container">
        <!-- VK карточка -->
        <div class="glass-card" data-social="vk" data-copy-text="https://vk.com/lammerx">
            <div class="qr-code">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://vk.com/lammerx" alt="QR VK">
            </div>
            <div class="social-name">VK</div>
            <div class="copy-area">
                <span class="copy-text">vk.com/lammerx</span>
                <button class="copy-btn">Копировать</button>
            </div>
        </div>

        <!-- Telegram карточка -->
        <div class="glass-card" data-social="tg" data-copy-text="@LammerLS">
            <div class="qr-code">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://t.me/LammerLS" alt="QR Telegram">
            </div>
            <div class="social-name">Telegram</div>
            <div class="copy-area">
                <span class="copy-text">@LammerLS</span>
                <button class="copy-btn">Копировать</button>
            </div>
        </div>

        <!-- MAX карточка -->
        <div class="glass-card" data-social="max" data-copy-text="https://max.ru/u/f9LHodD0cOJhMH1ud9LkqAebsd03sgC9kgr1Wto3dF0lhatlWBx4vpEodU0">
            <div class="qr-code">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://max.ru/u/f9LHodD0cOJhMH1ud9LkqAebsd03sgC9kgr1Wto3dF0lhatlWBx4vpEodU0" alt="QR MAX">
            </div>
            <div class="social-name">MAX</div>
            <div class="copy-area">
                <span class="copy-text">max.ru/u/...</span>
                <button class="copy-btn">Копировать</button>
            </div>
        </div>
    </div>

    <!-- Почтовый блок -->
    <div class="email-card" id="emailCard">
        <span class="email-icon">✉️</span>
        <span class="email-address">lammer146@gmail.com</span>
        <button class="copy-email-btn" id="copyEmailBtn">Копировать</button>
    </div>

    <div id="toastMsg" class="toast-message">✅ Скопировано</div>

    <script>
        (function() {
            // ---------- ЗВУК (короткий "пип") ----------
            let audioCtx = null;
            function playBeep() {
                try {
                    if (!audioCtx) {
                        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    }
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.frequency.value = 960;
                    gain.gain.value = 0.1;
                    osc.type = 'sine';
                    osc.start();
                    gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.25);
                    osc.stop(audioCtx.currentTime + 0.25);
                    if (audioCtx.state === 'suspended') {
                        audioCtx.resume();
                    }
                } catch(e) { /* fallback: без звука */ }
            }

            // ---------- УВЕДОМЛЕНИЕ ----------
            const toast = document.getElementById('toastMsg');
            function showToast(text, isError = false) {
                toast.textContent = isError ? '❌ ' + text : '✅ ' + text;
                toast.style.opacity = '1';
                setTimeout(() => {
                    toast.style.opacity = '0';
                }, 2000);
            }

            // ---------- АНИМАЦИИ ----------
            // Облачка для VK (8 штук)
            function spawnClouds(x, y) {
                const cloudVariants = ['☁️', '🌥️', '☁️', '💨'];
                for (let i = 0; i < 8; i++) {
                    const cloud = document.createElement('div');
                    cloud.className = 'anim-cloud';
                    cloud.textContent = cloudVariants[Math.floor(Math.random() * cloudVariants.length)];
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 70 + Math.random() * 130;
                    const dx = Math.cos(angle) * dist - 35;
                    const dy = Math.sin(angle) * dist - 55;
                    cloud.style.left = (x - 25 + (Math.random() - 0.5) * 60) + 'px';
                    cloud.style.top = (y - 25 + (Math.random() - 0.5) * 60) + 'px';
                    cloud.style.setProperty('--dx', dx + 'px');
                    cloud.style.setProperty('--dy', dy + 'px');
                    document.body.appendChild(cloud);
                    setTimeout(() => cloud.remove(), 850);
                }
            }

            // 10 бумажных самолётиков для Telegram
            function spawnPlanes(x, y) {
                for (let i = 0; i < 10; i++) {
                    const plane = document.createElement('div');
                    plane.className = 'anim-plane';
                    plane.textContent = '✈️';
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 100 + Math.random() * 160;
                    const dx = Math.cos(angle) * dist;
                    const dy = Math.sin(angle) * dist - 70;
                    plane.style.left = (x - 18) + 'px';
                    plane.style.top = (y - 18) + 'px';
                    plane.style.setProperty('--dx', dx + 'px');
                    plane.style.setProperty('--dy', dy + 'px');
                    document.body.appendChild(plane);
                    setTimeout(() => plane.remove(), 1000);
                }
            }

            // Звёзды (12) + ленточки (6) для MAX (9 мая стиль)
            function spawnVictory(x, y) {
                for (let i = 0; i < 12; i++) {
                    const star = document.createElement('div');
                    star.className = 'anim-star-red';
                    star.textContent = '⭐';
                    star.style.color = '#e33';
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 70 + Math.random() * 140;
                    const dx = Math.cos(angle) * dist;
                    const dy = Math.sin(angle) * dist - 50;
                    star.style.left = (x - 20) + 'px';
                    star.style.top = (y - 20) + 'px';
                    star.style.setProperty('--dx', dx + 'px');
                    star.style.setProperty('--dy', dy + 'px');
                    document.body.appendChild(star);
                    setTimeout(() => star.remove(), 850);
                }
                for (let i = 0; i < 6; i++) {
                    const ribbon = document.createElement('div');
                    ribbon.className = 'anim-ribbon';
                    ribbon.textContent = '🎗️';
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 90 + Math.random() * 135;
                    const dx = Math.cos(angle) * dist;
                    const dy = Math.sin(angle) * dist - 60;
                    ribbon.style.left = (x - 22) + 'px';
                    ribbon.style.top = (y - 22) + 'px';
                    ribbon.style.setProperty('--dx', dx + 'px');
                    ribbon.style.setProperty('--dy', dy + 'px');
                    document.body.appendChild(ribbon);
                    setTimeout(() => ribbon.remove(), 950);
                }
            }

            // ---------- ОСНОВНАЯ ФУНКЦИЯ КОПИРОВАНИЯ ----------
            async function copyWithEffects(text, social, cardElement) {
                try {
                    await navigator.clipboard.writeText(text);
                    showToast(`Скопировано: ${text.length > 35 ? text.substring(0, 32) + '…' : text}`);
                    playBeep();

                    // Свечение карточки
                    cardElement.classList.add('glow');
                    setTimeout(() => cardElement.classList.remove('glow'), 280);

                    // Координаты центра карточки для частиц
                    const rect = cardElement.getBoundingClientRect();
                    const centerX = rect.left + rect.width / 2;
                    const centerY = rect.top + rect.height / 2;

                    // Выбор анимации в зависимости от соцсети
                    if (social === 'vk') {
                        spawnClouds(centerX, centerY);
                    } else if (social === 'tg') {
                        spawnPlanes(centerX, centerY);
                    } else if (social === 'max') {
                        spawnVictory(centerX, centerY);
                    }
                } catch (err) {
                    showToast('Ошибка копирования. Попробуйте вручную.', true);
                }
            }

            // ---------- КОПИРОВАНИЕ ПОЧТЫ ----------
            async function copyEmailFunc() {
                const email = "lammer146@gmail.com";
                try {
                    await navigator.clipboard.writeText(email);
                    showToast(`Почта скопирована: ${email}`);
                    playBeep();
                    const emailBlock = document.getElementById('emailCard');
                    emailBlock.style.transform = 'scale(1.02)';
                    setTimeout(() => { if(emailBlock) emailBlock.style.transform = ''; }, 200);
                } catch(e) {
                    showToast('Не удалось скопировать почту', true);
                }
            }

            // ---------- ПЕРЕКЛЮЧЕНИЕ ТЕМЫ ДЕНЬ/НОЧЬ (без комет, только звёзды) ----------
            function generateStars() {
                const container = document.getElementById('starsContainer');
                if (!container) return;
                container.innerHTML = '';
                const starCount = 140;
                for (let i = 0; i < starCount; i++) {
                    const star = document.createElement('div');
                    star.classList.add('star');
                    const size = 1 + Math.random() * 3;
                    star.style.width = size + 'px';
                    star.style.height = size + 'px';
                    star.style.left = Math.random() * 100 + '%';
                    star.style.top = Math.random() * 100 + '%';
                    star.style.animationDuration = 1 + Math.random() * 4 + 's';
                    star.style.animationDelay = Math.random() * 5 + 's';
                    star.style.opacity = 0.4 + Math.random() * 0.5;
                    container.appendChild(star);
                }
            }

            const themeToggle = document.getElementById('themeToggle');
            const body = document.body;
            const starsContainerDiv = document.getElementById('starsContainer');
            const sunDeco = document.querySelector('.sun-deco');
            const fieldDeco = document.querySelector('.field-deco');

            function setTheme(theme) {
                if (theme === 'night') {
                    body.classList.remove('day');
                    body.classList.add('night');
                    themeToggle.innerHTML = '☀️ Дневная тема';
                    if (starsContainerDiv) starsContainerDiv.style.display = 'block';
                    generateStars();
                    if (sunDeco) sunDeco.style.opacity = '0';
                    if (fieldDeco) fieldDeco.style.opacity = '0';
                } else {
                    body.classList.remove('night');
                    body.classList.add('day');
                    themeToggle.innerHTML = '🌙 Ночная тема';
                    if (starsContainerDiv) starsContainerDiv.style.display = 'none';
                    if (sunDeco) sunDeco.style.opacity = '0.3';
                    if (fieldDeco) fieldDeco.style.opacity = '1';
                }
            }

            themeToggle.addEventListener('click', () => {
                if (body.classList.contains('day')) {
                    setTheme('night');
                } else {
                    setTheme('day');
                }
            });

            // Инициализация: дневная тема по умолчанию, звёзды скрыты
            setTheme('day');

            // ---------- НАЗНАЧЕНИЕ ОБРАБОТЧИКОВ НА КАРТОЧКИ ----------
            const cards = document.querySelectorAll('.glass-card');
            cards.forEach(card => {
                const copyBtn = card.querySelector('.copy-btn');
                const textToCopy = card.getAttribute('data-copy-text');
                const social = card.getAttribute('data-social');

                if (copyBtn) {
                    copyBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        copyWithEffects(textToCopy, social, card);
                    });
                }
                card.addEventListener('click', (e) => {
                    if (!e.target.classList.contains('copy-btn')) {
                        copyWithEffects(textToCopy, social, card);
                    }
                });
            });

            // Почта
            const emailCopyBtn = document.getElementById('copyEmailBtn');
            const emailCardDiv = document.getElementById('emailCard');
            if (emailCopyBtn) {
                emailCopyBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    copyEmailFunc();
                });
            }
            if (emailCardDiv) {
                emailCardDiv.addEventListener('click', (e) => {
                    if (!e.target.classList.contains('copy-email-btn')) {
                        copyEmailFunc();
                    }
                });
            }

            // Активация аудио контекста после первого касания
            const enableAudio = () => {
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                document.body.removeEventListener('click', enableAudio);
                document.body.removeEventListener('touchstart', enableAudio);
            };
            document.body.addEventListener('click', enableAudio);
            document.body.addEventListener('touchstart', enableAudio);
        })();
    </script>
</body>
</html>
