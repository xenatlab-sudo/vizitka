<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Lammer | Стеклянная визитка</title>
    <meta property="og:title" content="Lammer | Мои контакты">
    <meta property="og:description" content="Нажми на карточку, чтобы скопировать ссылку или ник">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            transition: background 0.6s ease, color 0.3s ease;
            position: relative;
        }

        /* ДНЕВНАЯ ТЕМА — утреннее поле */
        body.day {
            background: linear-gradient(145deg, #f9e7b3 0%, #c8e6b5 50%, #9bc48a 100%);
            color: #2c3e2f;
        }
        body.day::before {
            content: "🌾";
            font-size: 180px;
            position: fixed;
            bottom: 0;
            left: -40px;
            opacity: 0.2;
            pointer-events: none;
            transform: rotate(15deg);
        }
        body.day::after {
            content: "☀️";
            font-size: 140px;
            position: fixed;
            top: 20px;
            right: 20px;
            opacity: 0.3;
            pointer-events: none;
        }

        /* НОЧНАЯ ТЕМА — звёздное небо (без комет) */
        body.night {
            background: radial-gradient(ellipse at 30% 40%, #0a0f2a, #02030c);
            color: #eef;
        }
        body.night::before {
            content: "🌙";
            font-size: 110px;
            position: fixed;
            top: 20px;
            right: 30px;
            opacity: 0.6;
            pointer-events: none;
        }
        .star-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star-bg i {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.3; transform: scale(1);}
            100% { opacity: 1; transform: scale(1.2);}
        }

        /* Стили карточек в разных темах */
        body.night .glass-card {
            background: rgba(15, 20, 45, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.27);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }
        body.night .social-name {
            background: linear-gradient(135deg, #fff, #b0b0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        body.day .glass-card {
            background: rgba(245, 255, 235, 0.4);
            border: 1px solid rgba(255, 250, 210, 0.9);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        body.day .social-name {
            color: #2d4a22;
            text-shadow: 0 1px 2px rgba(255,255,180,0.8);
        }

        /* Переключатель темы */
        .theme-switch {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1001;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 10px 20px;
            border: 1px solid rgba(255,255,255,0.5);
            cursor: pointer;
            font-weight: 600;
            color: white;
            transition: 0.2s;
            font-size: 14px;
        }
        .theme-switch:hover {
            transform: scale(1.03);
            background: rgba(0,0,0,0.6);
        }

        /* Контейнер карточек */
        .cards-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            max-width: 1400px;
            margin: 30px auto;
            position: relative;
            z-index: 5;
        }

        /* Стеклянная карточка */
        .glass-card {
            width: 320px;
            padding: 30px 20px 30px 20px;
            border-radius: 52px;
            backdrop-filter: blur(16px);
            text-align: center;
            cursor: pointer;
            position: relative;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            transform: translateY(40px);
            opacity: 0;
            animation: slideUp 0.5s forwards;
        }
        .glass-card:nth-child(1) { animation-delay: 0.05s; }
        .glass-card:nth-child(2) { animation-delay: 0.15s; }
        .glass-card:nth-child(3) { animation-delay: 0.25s; }

        @keyframes slideUp {
            to { transform: translateY(0); opacity: 1; }
        }

        /* Увеличение при наведении */
        .glass-card:hover {
            transform: scale(1.05) translateY(-8px);
            transition: transform 0.25s ease;
        }

        /* Индивидуальные обводки */
        .glass-card[data-social="vk"] {
            border-left: 3px solid #4a90e2;
            border-right: 1px solid rgba(255,215,0,0.5);
        }
        .glass-card[data-social="tg"] {
            border-left: 3px solid #00d4ff;
            border-right: 1px solid rgba(0,119,255,0.5);
        }
        .glass-card[data-social="max"] {
            border-left: 3px solid #ff4500;
            border-right: 1px solid rgba(255,0,100,0.5);
        }

        .glass-card.glow {
            transition: 0.07s linear;
        }
        .glass-card[data-social="vk"].glow {
            box-shadow: 0 0 35px #ffb347, 0 0 18px #4a90e2;
        }
        .glass-card[data-social="tg"].glow {
            box-shadow: 0 0 35px #00d4ff, 0 0 18px #0077ff;
        }
        .glass-card[data-social="max"].glow {
            box-shadow: 0 0 40px #ff3300, 0 0 20px #ff0066;
        }

        .qr-code {
            width: 160px;
            height: 160px;
            margin: 0 auto 20px;
            background: white;
            border-radius: 28px;
            padding: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .qr-code img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .social-name {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .copy-area {
            margin-top: 20px;
            background: rgba(255,255,255,0.25);
            border-radius: 60px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            backdrop-filter: blur(5px);
        }
        .copy-text {
            font-size: 13px;
            font-weight: 500;
            word-break: break-all;
            flex: 1;
            text-align: left;
            color: inherit;
        }
        .copy-btn {
            background: white;
            border: none;
            border-radius: 40px;
            padding: 6px 14px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
            color: #111;
        }
        .copy-btn:hover {
            transform: scale(1.03);
            background: #f8f8f8;
        }

        /* Кнопка сохранить контакты */
        .download-btn {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.5);
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-top: 30px;
            transition: 0.2s;
            color: inherit;
            z-index: 10;
        }
        .download-btn:hover {
            background: rgba(0,0,0,0.45);
            transform: scale(1.02);
        }

        /* Блок с почтой */
        .email-block {
            margin-top: 30px;
            margin-bottom: 20px;
            font-size: 16px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 60px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255,255,255,0.4);
            transition: 0.2s;
            cursor: pointer;
        }
        .email-block:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.01);
        }
        .email-icon {
            font-size: 1.4rem;
        }
        .email-address {
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        /* Уведомление */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f1f2eef;
            backdrop-filter: blur(12px);
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 14px;
            z-index: 2000;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            font-weight: 500;
        }

        /* Анимационные элементы */
        .cloud-anim {
            position: fixed;
            font-size: 38px;
            pointer-events: none;
            z-index: 2000;
            animation: cloudFloat 0.9s ease-out forwards;
        }
        @keyframes cloudFloat {
            0% { transform: scale(0.4) translate(0,0); opacity: 1; }
            100% { transform: scale(1.3) translate(var(--dx), var(--dy)); opacity: 0; }
        }

        .plane-anim {
            position: fixed;
            font-size: 32px;
            pointer-events: none;
            z-index: 2000;
            animation: flyAnim 1s ease-out forwards;
        }
        @keyframes flyAnim {
            0% { transform: translate(0,0) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) rotate(720deg); opacity: 0; }
        }

        .star-red-anim {
            position: fixed;
            font-size: 32px;
            pointer-events: none;
            z-index: 2000;
            animation: starRiseAnim 0.9s ease-out forwards;
        }
        .ribbon-anim {
            position: fixed;
            font-size: 30px;
            pointer-events: none;
            z-index: 2000;
            animation: ribbonSpin 0.9s ease-out forwards;
        }
        @keyframes starRiseAnim {
            0% { transform: scale(0.2) translate(0,0); opacity: 1; }
            100% { transform: scale(1.5) translate(var(--dx), var(--dy)); opacity: 0; }
        }
        @keyframes ribbonSpin {
            0% { transform: rotate(0deg) scale(0.5); opacity: 1; }
            100% { transform: rotate(400deg) scale(1.4) translate(var(--dx), var(--dy)); opacity: 0; }
        }

        /* Адаптив */
        @media (max-width: 700px) {
            .glass-card { width: 280px; padding: 20px 15px; }
            .qr-code { width: 140px; height: 140px; }
            .social-name { font-size: 24px; }
        }
    </style>
</head>
<body class="day">
    <div class="theme-switch" id="themeToggle">🌙 Ночь</div>
    <div id="starContainer" class="star-bg"></div>

    <div class="cards-container">
        <!-- VK -->
        <div class="glass-card" data-social="vk" data-copy-text="https://vk.com/lammerx">
            <div class="qr-code">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=https://vk.com/lammerx" alt="QR VK">
            </div>
            <div class="social-name">VK</div>
            <div class="copy-area">
                <span class="copy-text">vk.com/lammerx</span>
                <button class="copy-btn">Копировать</button>
            </div>
        </div>

        <!-- Telegram -->
        <div class="glass-card" data-social="tg" data-copy-text="@LammerLS">
            <div class="qr-code">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=https://t.me/LammerLS" alt="QR TG">
            </div>
            <div class="social-name">Telegram</div>
            <div class="copy-area">
                <span class="copy-text">@LammerLS</span>
                <button class="copy-btn">Копировать</button>
            </div>
        </div>

        <!-- MAX -->
        <div class="glass-card" data-social="max" data-copy-text="https://max.ru/u/f9LHodD0cOJhMH1ud9LkqAebsd03sgC9kgr1Wto3dF0lhatlWBx4vpEodU0">
            <div class="qr-code">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=https://max.ru/u/f9LHodD0cOJhMH1ud9LkqAebsd03sgC9kgr1Wto3dF0lhatlWBx4vpEodU0" alt="QR MAX">
            </div>
            <div class="social-name">MAX</div>
            <div class="copy-area">
                <span class="copy-text">max.ru/u/...</span>
                <button class="copy-btn">Копировать</button>
            </div>
        </div>
    </div>

    <button class="download-btn" id="downloadBtn">📎 Сохранить контакты (vCard)</button>

    <!-- Почта с возможностью копирования -->
    <div class="email-block" id="emailBlock">
        <span class="email-icon">✉️</span>
        <span class="email-address">lammer146@gmail.com</span>
        <span class="copy-hint" style="font-size:12px; opacity:0.7;">(нажми, чтобы скопировать)</span>
    </div>

    <div id="toast" class="toast">✅ Скопировано!</div>

    <script>
        // Звук
        let audioCtx = null;
        function playPop() {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 880;
                gain.gain.value = 0.12;
                osc.type = 'sine';
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.25);
                osc.stop(audioCtx.currentTime + 0.25);
                if (audioCtx.state === 'suspended') audioCtx.resume();
            } catch(e) { console.log("audio error"); }
        }

        // Анимации
        function animateClouds(cx, cy) {
            for (let i = 0; i < 8; i++) {
                const cloud = document.createElement('div');
                cloud.className = 'cloud-anim';
                cloud.textContent = ['☁️','🌥️','☁️','💨'][Math.floor(Math.random()*4)];
                const angle = Math.random() * Math.PI * 2;
                const dist = 70 + Math.random() * 130;
                const dx = Math.cos(angle) * dist - 40;
                const dy = Math.sin(angle) * dist - 60;
                cloud.style.left = (cx - 30 + (Math.random()-0.5)*60) + 'px';
                cloud.style.top = (cy - 30 + (Math.random()-0.5)*60) + 'px';
                cloud.style.setProperty('--dx', dx + 'px');
                cloud.style.setProperty('--dy', dy + 'px');
                document.body.appendChild(cloud);
                setTimeout(() => cloud.remove(), 900);
            }
        }

        function animatePlanes(cx, cy) {
            for (let i = 0; i < 10; i++) {
                const plane = document.createElement('div');
                plane.className = 'plane-anim';
                plane.textContent = '✈️';
                const angle = Math.random() * Math.PI * 2;
                const dist = 100 + Math.random() * 150;
                const dx = Math.cos(angle) * dist;
                const dy = Math.sin(angle) * dist - 70;
                plane.style.left = (cx - 18) + 'px';
                plane.style.top = (cy - 18) + 'px';
                plane.style.setProperty('--dx', dx + 'px');
                plane.style.setProperty('--dy', dy + 'px');
                document.body.appendChild(plane);
                setTimeout(() => plane.remove(), 1000);
            }
        }

        function animateVictory(cx, cy) {
            for (let i = 0; i < 12; i++) {
                const star = document.createElement('div');
                star.className = 'star-red-anim';
                star.textContent = '⭐';
                star.style.color = '#e33';
                const angle = Math.random() * Math.PI * 2;
                const dist = 70 + Math.random() * 140;
                const dx = Math.cos(angle) * dist;
                const dy = Math.sin(angle) * dist - 55;
                star.style.left = (cx - 20) + 'px';
                star.style.top = (cy - 20) + 'px';
                star.style.setProperty('--dx', dx + 'px');
                star.style.setProperty('--dy', dy + 'px');
                document.body.appendChild(star);
                setTimeout(() => star.remove(), 850);
            }
            for (let i = 0; i < 6; i++) {
                const rib = document.createElement('div');
                rib.className = 'ribbon-anim';
                rib.textContent = '🎗️';
                const angle = Math.random() * Math.PI * 2;
                const dist = 90 + Math.random() * 130;
                const dx = Math.cos(angle) * dist;
                const dy = Math.sin(angle) * dist - 65;
                rib.style.left = (cx - 22) + 'px';
                rib.style.top = (cy - 22) + 'px';
                rib.style.setProperty('--dx', dx + 'px');
                rib.style.setProperty('--dy', dy + 'px');
                document.body.appendChild(rib);
                setTimeout(() => rib.remove(), 950);
            }
        }

        async function copyTextWithEffects(text, social, element) {
            try {
                await navigator.clipboard.writeText(text);
                const toast = document.getElementById('toast');
                toast.textContent = `✅ Скопировано: ${text.substring(0, 35)}${text.length>35?'…':''}`;
                toast.style.opacity = '1';
                setTimeout(() => toast.style.opacity = '0', 1800);
                playPop();

                const card = element.closest('.glass-card');
                if (card) {
                    card.classList.add('glow');
                    setTimeout(() => card.classList.remove('glow'), 300);
                    const rect = card.getBoundingClientRect();
                    const cx = rect.left + rect.width/2;
                    const cy = rect.top + rect.height/2;
                    if (social === 'vk') animateClouds(cx, cy);
                    else if (social === 'tg') animatePlanes(cx, cy);
                    else if (social === 'max') animateVictory(cx, cy);
                } else {
                    // если клик по почте (отдельный обработчик)
                    const emailBlock = document.getElementById('emailBlock');
                    if (element === emailBlock || element.closest('.email-block')) {
                        // легкое свечение
                        emailBlock.style.transform = 'scale(1.02)';
                        setTimeout(() => emailBlock.style.transform = '', 200);
                    }
                }
            } catch(err) {
                document.getElementById('toast').textContent = '❌ Ошибка копирования';
                setTimeout(() => document.getElementById('toast').style.opacity = '0', 1500);
            }
        }

        // Сохранение контактов
        function downloadVCard() {
            const vcard = `BEGIN:VCARD
VERSION:3.0
FN:Lammer
EMAIL:lammer146@gmail.com
X-SOCIALPROFILE;type=VK:https://vk.com/lammerx
X-SOCIALPROFILE;type=Telegram:@LammerLS
X-SOCIALPROFILE;type=MAX:https://max.ru/u/f9LHodD0cOJhMH1ud9LkqAebsd03sgC9kgr1Wto3dF0lhatlWBx4vpEodU0
END:VCARD`;
            const blob = new Blob([vcard], {type: 'text/vcard'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'lammer_contacts.vcf';
            link.click();
            URL.revokeObjectURL(link.href);
            const toast = document.getElementById('toast');
            toast.textContent = '📇 Контакты сохранены';
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 1500);
        }

        // Тема день/ночь (без комет)
        function addStars() {
            const container = document.getElementById('starContainer');
            container.innerHTML = '';
            const starCount = 120;
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('i');
                const size = 1 + Math.random() * 3;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDuration = 1 + Math.random() * 3 + 's';
                star.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(star);
            }
        }

        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            const body = document.body;
            if (body.classList.contains('day')) {
                body.classList.remove('day');
                body.classList.add('night');
                themeToggle.innerHTML = '☀️ День';
                addStars();
            } else {
                body.classList.remove('night');
                body.classList.add('day');
                themeToggle.innerHTML = '🌙 Ночь';
                document.getElementById('starContainer').innerHTML = '';
            }
        });

        if (document.body.classList.contains('night')) addStars();

        // Обработчики карточек и почты
        document.querySelectorAll('.glass-card').forEach(card => {
            const btn = card.querySelector('.copy-btn');
            const text = card.getAttribute('data-copy-text');
            const social = card.getAttribute('data-social');
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                copyTextWithEffects(text, social, card);
            });
            card.addEventListener('click', (e) => {
                if (!e.target.classList.contains('copy-btn')) {
                    copyTextWithEffects(text, social, card);
                }
            });
        });

        const emailBlock = document.getElementById('emailBlock');
        const emailAddress = 'lammer146@gmail.com';
        emailBlock.addEventListener('click', async (e) => {
            e.stopPropagation();
            try {
                await navigator.clipboard.writeText(emailAddress);
                const toast = document.getElementById('toast');
                toast.textContent = `✉️ Почта скопирована: ${emailAddress}`;
                toast.style.opacity = '1';
                setTimeout(() => toast.style.opacity = '0', 1800);
                playPop();
                emailBlock.style.transform = 'scale(1.02)';
                setTimeout(() => emailBlock.style.transform = '', 200);
            } catch(err) {
                document.getElementById('toast').textContent = '❌ Ошибка копирования';
            }
        });

        document.getElementById('downloadBtn').addEventListener('click', downloadVCard);

        // Активация звука после первого клика
        document.body.addEventListener('click', () => {
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        }, { once: true });
    </script>
</body>
</html>
